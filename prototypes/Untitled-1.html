<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasa Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .task-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .task-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="max-w-md mx-auto bg-gray-50 min-h-screen pb-24">

    <!-- Top Profile Section -->
    <div class="bg-emerald-700 pt-10 pb-20 px-6 rounded-b-[40px] shadow-lg relative overflow-hidden">
        <!-- Decorative Background Circles -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full"></div>
        <div class="absolute top-20 -left-10 w-24 h-24 bg-emerald-500/20 rounded-full"></div>

        <div class="flex justify-between items-center relative z-10">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-14 h-14 bg-emerald-100 rounded-2xl flex items-center justify-center border-2 border-white/50 text-emerald-800 font-bold text-2xl shadow-inner">
                        ম
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-400 border-2 border-emerald-700 rounded-full"></div>
                </div>
                <div>
                    <h1 class="text-white font-bold text-xl leading-tight">মুহাম্মাদ রাফি</h1>
                    <p class="text-emerald-100 text-sm opacity-90 font-medium">আইডি: ০০১ • হিফজ ১ম</p>
                </div>
            </div>
            <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl text-white text-sm font-semibold transition-colors border border-white/20">
                লগআউট
            </button>
        </div>
    </div>

    <!-- Main Content Container (Overlapping Header) -->
    <main class="px-5 -mt-12 relative z-20">
        
        <!-- Stats Dashboard Card -->
        <div class="bg-white rounded-[32px] p-6 shadow-xl shadow-emerald-900/5 border border-white mb-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-slate-800 font-bold text-lg">আজকের আমল</h2>
                    <p class="text-slate-400 text-xs font-medium">১টির মধ্যে ০টি সম্পন্ন</p>
                </div>
                <div class="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border border-emerald-100">
                    Live
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <!-- Today Stats -->
                <div class="flex flex-col items-center">
                    <div class="relative flex items-center justify-center w-16 h-16">
                        <svg class="w-full h-full">
                            <circle class="text-gray-100" stroke-width="6" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                            <circle class="text-emerald-500 progress-ring-circle" stroke-width="6" stroke-dasharray="175.9" stroke-dashoffset="175.9" stroke-linecap="round" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                        </svg>
                        <span class="absolute text-sm font-bold text-slate-700">০%</span>
                    </div>
                    <span class="mt-2 text-xs font-bold text-slate-500">আজ</span>
                    <span class="text-[10px] text-slate-400">০/১</span>
                </div>

                <!-- Week Stats -->
                <div class="flex flex-col items-center">
                    <div class="relative flex items-center justify-center w-16 h-16">
                        <svg class="w-full h-full">
                            <circle class="text-gray-100" stroke-width="6" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                            <circle class="text-emerald-400 progress-ring-circle" stroke-width="6" stroke-dasharray="175.9" stroke-dashoffset="150" stroke-linecap="round" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                        </svg>
                        <span class="absolute text-sm font-bold text-slate-700">১৫%</span>
                    </div>
                    <span class="mt-2 text-xs font-bold text-slate-500">সপ্তাহ</span>
                    <span class="text-[10px] text-slate-400">১/৭</span>
                </div>

                <!-- Month Stats -->
                <div class="flex flex-col items-center">
                    <div class="relative flex items-center justify-center w-16 h-16">
                        <svg class="w-full h-full">
                            <circle class="text-gray-100" stroke-width="6" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                            <circle class="text-blue-400 progress-ring-circle" stroke-width="6" stroke-dasharray="175.9" stroke-dashoffset="160" stroke-linecap="round" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                        </svg>
                        <span class="absolute text-sm font-bold text-slate-700">৮%</span>
                    </div>
                    <span class="mt-2 text-xs font-bold text-slate-500">মাস</span>
                    <span class="text-[10px] text-slate-400">৩/৩০</span>
                </div>
            </div>
        </div>

        <!-- Horizontal Tabs/Filters -->
        <div class="flex gap-2 mb-6 overflow-x-auto no-scrollbar pb-1">
            <button class="bg-emerald-600 text-white px-6 py-2.5 rounded-2xl text-sm font-semibold shadow-lg shadow-emerald-200 shrink-0">সব</button>
            <button class="bg-white text-slate-500 px-6 py-2.5 rounded-2xl text-sm font-semibold border border-slate-200 shrink-0 hover:bg-gray-50">দৈনিক</button>
            <button class="bg-white text-slate-500 px-6 py-2.5 rounded-2xl text-sm font-semibold border border-slate-200 shrink-0 hover:bg-gray-50">এককালীন</button>
            <button class="bg-white text-slate-500 px-6 py-2.5 rounded-2xl text-sm font-semibold border border-slate-200 shrink-0 hover:bg-gray-50">সম্পন্ন</button>
        </div>

        <!-- Task List Section -->
        <div class="space-y-4">
            <!-- Notice Banner -->
            <div class="bg-emerald-50 border border-emerald-100 p-3 rounded-2xl flex items-center gap-3">
                <div class="bg-emerald-200 p-1.5 rounded-lg text-emerald-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
                </div>
                <p class="text-[11px] text-emerald-800 font-medium">দৈনিক আমল — আজ ০/১ সম্পন্ন। প্রতিদিন নতুন হয়।</p>
            </div>

            <!-- Task Card -->
            <div class="bg-white p-6 rounded-[28px] border border-slate-100 shadow-sm relative task-card group">
                <!-- Status Badge -->
                <div class="absolute top-4 right-4 bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Daily</div>
                
                <div class="flex gap-4 items-start">
                    <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-2xl border border-gray-100 group-hover:bg-emerald-50 transition-colors">
                        ⏳
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-slate-800 text-lg">নামাযের আমল (A)</h3>
                        </div>
                        <p class="text-slate-400 text-sm mt-1">বিবরণ: হাহাহাহা (Hhh)</p>
                    </div>
                </div>

                <div class="mt-6 flex items-center justify-between">
                    <div class="flex items-center gap-1.5 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><polyline points="9 11 12 14 22 4"/></svg>
                        <span class="text-xs font-semibold uppercase tracking-wider">প্রতিদিন</span>
                    </div>
                    <button id="completeBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-3 rounded-2xl transition-all active:scale-95 shadow-md shadow-emerald-200">
                        আজ সম্পন্ন করেছি
                    </button>
                </div>
            </div>

            <!-- Second Example (Locked/Future) -->
            <div class="bg-gray-100/50 p-6 rounded-[28px] border border-dashed border-gray-200 opacity-60">
                <div class="flex gap-4 items-center">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-xl text-gray-400">
                        🔒
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-500 text-lg">কুরআন তিলাওয়াত</h3>
                        <p class="text-gray-400 text-xs">পরবর্তী সেশনে আনলক হবে</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar (Modern Standard) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-100 px-6 py-3 flex justify-between items-center z-50 shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
        <button class="flex flex-col items-center gap-1 group">
            <div class="text-slate-400 group-hover:text-emerald-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-400 group-hover:text-emerald-600">হোম</span>
        </button>
        <button class="flex flex-col items-center gap-1 group relative">
            <div class="text-emerald-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <span class="text-[10px] font-bold text-emerald-600">আমল</span>
            <div class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[8px] flex items-center justify-center rounded-full font-bold border border-white">১</div>
        </button>
        <button class="flex flex-col items-center gap-1 group">
            <div class="text-slate-400 group-hover:text-emerald-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14h.01"/><path d="M9 18h.01"/><path d="M12 14h.01"/><path d="M12 18h.01"/><path d="M15 14h.01"/><path d="M15 18h.01"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-400 group-hover:text-emerald-600">পরীক্ষা</span>
        </button>
        <button class="flex flex-col items-center gap-1 group">
            <div class="text-slate-400 group-hover:text-emerald-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"/><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-400 group-hover:text-emerald-600">রিসালা</span>
        </button>
        <button class="flex flex-col items-center gap-1 group">
            <div class="text-slate-400 group-hover:text-emerald-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-400 group-hover:text-emerald-600">ফাইল</span>
        </button>
    </nav>

    <script>
        // Simple Interaction Mockup
        const btn = document.getElementById('completeBtn');
        btn.addEventListener('click', () => {
            btn.innerHTML = '🎉 সম্পন্ন হয়েছে';
            btn.classList.remove('bg-emerald-600');
            btn.classList.add('bg-slate-800');
            btn.disabled = true;
            
            // Animation for feedback
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body>
</html>
